# OCI Workflow: image-flow
#
# Triggered when a Slack event contains file attachments.
# Steps:
#   1. fn-image-extractor  - downloads the image and extracts invoice text via Gemini Vision
#   2. fn-ai-agent         - runs the share-calculation agent loop
#   3. fn-slack-reply      - posts the result back to the Slack thread
#
# Replace all <...> placeholders with your actual OCI OCIDs before deploying.
# Deploy via: oci workflow workflow create --from-file image-flow.yaml

version: "1.0"
name: image-flow
description: "Process an invoice image from Slack, calculate bill shares, post reply"

states:
  - type: TASK
    name: extract_image
    action:
      type: INVOKE_FUNCTION
      functionId: "<replace-with-fn-image-extractor-ocid>"
    inputFrom: "$.input"
    resultTo: "$.extractResult"
    next: calculate_shares

  - type: TASK
    name: calculate_shares
    action:
      type: INVOKE_FUNCTION
      functionId: "<replace-with-fn-ai-agent-ocid>"
    inputFrom: "$.extractResult"
    resultTo: "$.agentResult"
    next: post_reply

  - type: TASK
    name: post_reply
    action:
      type: INVOKE_FUNCTION
      functionId: "<replace-with-fn-slack-reply-ocid>"
    inputFrom: "$.agentResult"
    resultTo: "$.replyResult"
    next: end_state

  - type: SUCCEED
    name: end_state
